<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ScreenCap Desktop</title>
<style>
  :root { --bg:#111318; --card:#1b1e27; --accent:#e53935; --accent2:#7c4dff; --text:#e8eaf0; --dim:#8a8fa3; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font:14px/1.45 'Segoe UI',system-ui,sans-serif; padding:18px; }
  h1 { font-size:18px; letter-spacing:.5px; margin-bottom:14px; }
  h1 .dot { color:var(--accent); }
  .layout { display:grid; grid-template-columns: 280px 1fr; gap:16px; }
  .panel { background:var(--card); border-radius:12px; padding:14px; }
  .panel h2 { font-size:12px; text-transform:uppercase; color:var(--dim); margin-bottom:10px; letter-spacing:1px; }
  .scenes { display:grid; gap:8px; }
  .scene { border:1px solid #2a2e3c; background:#161922; color:var(--text); border-radius:9px;
           padding:10px 12px; cursor:pointer; text-align:left; font-size:13px; }
  .scene small { display:block; color:var(--dim); }
  .scene.active { border-color:var(--accent2); background:#221d33; }
  select, button.ctl { width:100%; background:#161922; color:var(--text); border:1px solid #2a2e3c;
           border-radius:8px; padding:8px; margin-bottom:8px; font-size:13px; }
  .row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
  .row label { color:var(--dim); font-size:12px; flex:1; }
  canvas { width:100%; border-radius:12px; background:#000; display:block; aspect-ratio:16/9; }
  .controls { display:flex; gap:10px; margin-top:12px; align-items:center; }
  .btn { border:none; border-radius:9px; padding:11px 20px; font-size:14px; font-weight:600; cursor:pointer; }
  .rec { background:var(--accent); color:#fff; }
  .rec.on { background:#5c6270; }
  .sec { background:#2a2e3c; color:var(--text); }
  #timer { font-variant-numeric:tabular-nums; font-size:15px; color:var(--dim); }
  #timer.live { color:var(--accent); font-weight:700; }
  .meter { height:6px; background:#0c0e13; border-radius:3px; overflow:hidden; margin-top:4px; }
  .meter i { display:block; height:100%; width:0%; background:linear-gradient(90deg,#43a047,#fbc02d,#e53935); }
  .hint { color:var(--dim); font-size:12px; margin-top:10px; }
  #status { margin-left:auto; color:var(--dim); font-size:12px; }
</style>
</head>
<body>
<h1>ScreenCap <span class="dot">●</span> Desktop</h1>
<div class="layout">
  <div>
    <div class="panel" style="margin-bottom:14px">
      <h2>Scenes</h2>
      <div class="scenes">
        <button class="scene active" data-scene="screen">🖥 Screen<br><small>full screen + system audio</small></button>
        <button class="scene" data-scene="camera">📷 Camera only<br><small>webcam or phone camera, full frame</small></button>
        <button class="scene" data-scene="pip">🖥+📷 Screen + Camera<br><small>picture-in-picture, bottom right</small></button>
      </div>
    </div>
    <div class="panel">
      <h2>Sources</h2>
      <label class="hint">Camera (phone = DroidCam / Iriun app)</label>
      <select id="camSel"></select>
      <label class="hint">Microphone</label>
      <select id="micSel"></select>
      <div class="row"><label>Mic enabled</label><input type="checkbox" id="micOn" checked></div>
      <div class="row"><label>System audio</label><input type="checkbox" id="sysOn" checked></div>
      <div class="meter"><i id="micMeter"></i></div>
      <div class="hint">Tip: install <b>DroidCam</b> or <b>Iriun Webcam</b> on your phone — it appears in the camera list above over Wi-Fi/USB.</div>
    </div>
  </div>
  <div class="panel">
    <h2>Preview</h2>
    <canvas id="stage" width="1920" height="1080"></canvas>
    <div class="controls">
      <button class="btn rec" id="recBtn">● Record</button>
      <button class="btn sec" id="pauseBtn" disabled>Pause</button>
      <button class="btn sec" id="shotBtn">📸 Screenshot</button>
      <span id="timer">0:00</span>
      <span id="status"></span>
    </div>
  </div>
</div>

<video id="screenVid" muted style="display:none"></video>
<video id="camVid" muted style="display:none"></video>

<script>
const stage = document.getElementById('stage');
const ctx = stage.getContext('2d');
const screenVid = document.getElementById('screenVid');
const camVid = document.getElementById('camVid');

let scene = 'screen';
let screenStream = null, camStream = null, micStream = null;
let recorder = null, chunks = [], startMs = 0, pausedMs = 0, pauseStart = 0, timerIv = null;

const audioCtx = new AudioContext();
const mixDest = audioCtx.createMediaStreamDestination();
let micGainNode = null, sysGainNode = null, analyser = null;

async function listDevices() {
  // Need permission once for labels.
  try { (await navigator.mediaDevices.getUserMedia({ audio: true })).getTracks().forEach(t => t.stop()); } catch {}
  const devs = await navigator.mediaDevices.enumerateDevices();
  const cams = devs.filter(d => d.kind === 'videoinput');
  const mics = devs.filter(d => d.kind === 'audioinput');
  camSel.innerHTML = cams.map(d => `<option value="${d.deviceId}">${d.label || 'Camera'}</option>`).join('');
  micSel.innerHTML = mics.map(d => `<option value="${d.deviceId}">${d.label || 'Microphone'}</option>`).join('');
}

async function ensureScreen() {
  if (screenStream) return;
  screenStream = await navigator.mediaDevices.getDisplayMedia({
    video: { frameRate: 30 }, audio: true,
  });
  screenVid.srcObject = screenStream; await screenVid.play();
  const at = screenStream.getAudioTracks();
  if (at.length) {
    sysGainNode = audioCtx.createGain();
    audioCtx.createMediaStreamSource(new MediaStream([at[0]])).connect(sysGainNode);
    sysGainNode.connect(mixDest);
  }
}

async function ensureCam() {
  if (camStream) camStream.getTracks().forEach(t => t.stop());
  camStream = await navigator.mediaDevices.getUserMedia({
    video: { deviceId: camSel.value ? { exact: camSel.value } : undefined,
             width: 1280, height: 720 },
  });
  camVid.srcObject = camStream; await camVid.play();
}

async function ensureMic() {
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  micStream = await navigator.mediaDevices.getUserMedia({
    audio: { deviceId: micSel.value ? { exact: micSel.value } : undefined,
             echoCancellation: true, noiseSuppression: true },
  });
  micGainNode = audioCtx.createGain();
  const src = audioCtx.createMediaStreamSource(micStream);
  src.connect(micGainNode); micGainNode.connect(mixDest);
  analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
  src.connect(analyser);
}

function drawCover(v, x, y, w, h) {
  if (!v.videoWidth) return;
  const s = Math.max(w / v.videoWidth, h / v.videoHeight);
  const dw = v.videoWidth * s, dh = v.videoHeight * s;
  ctx.drawImage(v, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
}

function render() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, stage.width, stage.height);
  if (scene === 'screen') drawCover(screenVid, 0, 0, stage.width, stage.height);
  else if (scene === 'camera') drawCover(camVid, 0, 0, stage.width, stage.height);
  else {
    drawCover(screenVid, 0, 0, stage.width, stage.height);
    const w = stage.width * 0.24, h = w * 9 / 16, m = 28;
    const x = stage.width - w - m, y = stage.height - h - m;
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 18); ctx.clip();
    drawCover(camVid, x, y, w, h);
    ctx.restore();
    ctx.strokeStyle = '#e53935'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.roundRect(x, y, w, h, 18); ctx.stroke();
  }
  // mic meter
  if (analyser && micOn.checked) {
    const buf = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(buf);
    let peak = 0; for (const v of buf) peak = Math.max(peak, Math.abs(v - 128) / 128);
    micMeter.style.width = Math.min(100, peak * 140) + '%';
  } else micMeter.style.width = '0%';
  requestAnimationFrame(render);
}

async function applyScene() {
  status.textContent = 'preparing…';
  try {
    if (scene !== 'camera') await ensureScreen();
    if (scene !== 'screen') await ensureCam();
    status.textContent = '';
  } catch (e) { status.textContent = e.message; }
}

function fmtTime(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

async function toggleRecord() {
  if (recorder && recorder.state !== 'inactive') {
    recorder.stop();
    return;
  }
  await applyScene();
  if (micOn.checked) await ensureMic();
  if (micGainNode) micGainNode.gain.value = micOn.checked ? 1 : 0;
  if (sysGainNode) sysGainNode.gain.value = sysOn.checked ? 1 : 0;

  const out = stage.captureStream(30);
  mixDest.stream.getAudioTracks().forEach(t => out.addTrack(t));
  chunks = [];
  recorder = new MediaRecorder(out, { mimeType: 'video/webm;codecs=vp9,opus', videoBitsPerSecond: 8_000_000 });
  recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  recorder.onstop = async () => {
    clearInterval(timerIv);
    recBtn.textContent = '● Record'; recBtn.classList.remove('on');
    pauseBtn.disabled = true; pauseBtn.textContent = 'Pause';
    timer.classList.remove('live');
    const blob = new Blob(chunks, { type: 'video/webm' });
    const name = `ScreenCap_${new Date().toISOString().replace(/[:.]/g, '-')}.webm`;
    const saved = await window.screencap.saveRecording(await blob.arrayBuffer(), name);
    status.textContent = saved ? `saved → ${saved}` : 'save canceled';
  };
  recorder.start(1000);
  startMs = Date.now(); pausedMs = 0;
  recBtn.textContent = '■ Stop'; recBtn.classList.add('on');
  pauseBtn.disabled = false;
  timer.classList.add('live');
  timerIv = setInterval(() => {
    const base = recorder.state === 'paused' ? pauseStart : Date.now();
    timer.textContent = fmtTime(base - startMs - pausedMs);
  }, 250);
}

function togglePause() {
  if (!recorder) return;
  if (recorder.state === 'recording') {
    recorder.pause(); pauseStart = Date.now(); pauseBtn.textContent = 'Resume';
  } else if (recorder.state === 'paused') {
    recorder.resume(); pausedMs += Date.now() - pauseStart; pauseBtn.textContent = 'Pause';
  }
}

function screenshot() {
  const a = document.createElement('a');
  a.download = `ScreenCap_${Date.now()}.png`;
  a.href = stage.toDataURL('image/png');
  a.click();
  status.textContent = 'screenshot saved to Downloads';
}

document.querySelectorAll('.scene').forEach(b => b.onclick = async () => {
  document.querySelectorAll('.scene').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  scene = b.dataset.scene;
  await applyScene();
});
recBtn.onclick = toggleRecord;
pauseBtn.onclick = togglePause;
shotBtn.onclick = screenshot;
camSel.onchange = () => { if (scene !== 'screen') ensureCam(); };
micOn.onchange = () => { if (micGainNode) micGainNode.gain.value = micOn.checked ? 1 : 0; };
sysOn.onchange = () => { if (sysGainNode) sysGainNode.gain.value = sysOn.checked ? 1 : 0; };

listDevices();
applyScene();
render();
</script>
</body>
</html>
